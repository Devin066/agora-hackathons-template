evaluation_process:
  overview: "The evaluation process consists of two rounds: an initial technical screening of all submissions, followed by final stage presentations for the top teams."

  phases:
    - name: "Round 1: Technical Screening"
      duration: "4:00 PM - 5:30 PM"
      description: "Judges review code, demos, and documentation for all submissions to select the top finalists."

    - name: "Round 2: Final Presentations"
      duration: "5 minutes pitch + 2 minutes Q&A"
      description: "Top selected teams present their solutions on stage to the full panel."

    - name: "Final Deliberation"
      duration: "40 minutes"
      description: "Judges review scores, discuss finalists, and select the winners."

    - name: "Awards Announcement"
      description: "Winners announced with technical and product feedback"

  scoring_methodology: |-
    Each criterion is scored on a 1-5 scale:
    - 5 (Exceptional): Exceeds expectations, innovative approach, could be production-ready
    - 4 (Very Good): Strong implementation with minor areas for improvement
    - 3 (Good): Meets requirements with solid execution
    - 2 (Basic): Functional but lacks polish or depth
    - 1 (Needs Work): Incomplete or significant issues
    
    Final scores are calculated as weighted averages. Bonus points (up to +1) may be awarded for exceptional use of partner technologies or innovation.

