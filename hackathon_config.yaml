submission_guidelines:
  fork_instructions: "Fork this repository to your personal GitHub account before starting development."
  clone_instructions: "Clone your fork locally and set the main branch as upstream."

  development_guidance:
    - "Teams may use TRAE IDE for planning, coding, testing, and documentation"
    - "All generated code must be reviewed and validated by team members"
    - "Teams should explain how tools like TRAE were used"
    - "Team size is 1 to 4 members per team"
    - "Register an Agora Developer account in advance: https://console.agora.io/"

  team_folder_structure: |
    submissions/
      ├── team-name/
      │   ├── README.md
      │   ├── demo.mp4
      │   ├── src/
      │   ├── infra/
      │   └── docs/

judging_criteria:
  initial_phase:
    - name: "Integration & Use of Agora Technologies"
      weight: 30
      description: "Agora's Conversational AI Engine and/or RTC is meaningfully and centrally integrated into the product, as verified from the submitted codebase and demo video."

    - name: "System Functionality"
      weight: 25
      description: "The product works end-to-end reliably, as demonstrated through the submitted demo video and repository without team assistance."

    - name: "Technical Architecture"
      weight: 20
      description: "System design, technology choices, and scalability considerations are sound and assessable from the codebase and documentation alone."

    - name: "Originality of Concept"
      weight: 15
      description: "Evaluates the freshness and distinctiveness of the idea — judges assess whether the solution offers a novel approach to Voice AI that goes beyond common or predictable use cases."

    - name: "Submission Compliance"
      weight: 10
      description: "Evaluates adherence to the required GitHub repository format and boilerplate structure as specified in the submission guidelines."

  final_phase:
    - name: "Functionality & Demo Quality"
      weight: 25
      description: "Code quality, completeness, polish, and reliability of the submission, including a fully functional and stable live demo with complete features."

    - name: "Innovation and Creativity"
      weight: 25
      description: "Creativity, uniqueness, novelty of idea combined with real-world value and relevance."

    - name: "Impact & Real-World Application"
      weight: 20
      description: "Potential for solving real problems through process automation or user engagement."

    - name: "Sustainability & Feasibility"
      weight: 10
      description: "Community value, enterprise applicability, real-world relevance sustainability and business viability."

    - name: "Presentation & Pitch"
      weight: 20
      description: "Clear, engaging delivery of problem, solution, and demo with strong storytelling and visuals."

